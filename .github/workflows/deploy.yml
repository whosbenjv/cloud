name: Deploy to ECR

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          # servicio1
          docker build -t $REGISTRY/$REPOSITORY:servicio1 ./servicio1
          docker push $REGISTRY/$REPOSITORY:servicio1

          # servicio2
          docker build -t $REGISTRY/$REPOSITORY:servicio2 ./servicio2
          docker push $REGISTRY/$REPOSITORY:servicio2

          # servicio3
          docker build -t $REGISTRY/$REPOSITORY:servicio3 ./servicio3
          docker push $REGISTRY/$REPOSITORY:servicio3